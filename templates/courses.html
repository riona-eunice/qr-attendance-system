{% extends "base.html" %}
{% block title %}Add Course{% endblock %}
{% block content %}
<h1>Add a Course</h1>
<div class="card">
    {% if not faculty_list %}
        <p>You need to <a href="{{ url_for('faculty') }}">register at least one faculty member</a> first.</p>
    {% else %}
    <form method="POST">
        <label>Course Name</label>
        <input type="text" name="name" placeholder="e.g. Machine Learning Fundamentals" required>

        <label>Course Code</label>
        <input type="text" name="code" placeholder="e.g. AI301" required>

        <label>Faculty In-Charge</label>
        <select name="faculty_id" required>
            <option value="" disabled selected>Select faculty...</option>
            {% for f in faculty_list %}
                <option value="{{ f.id }}">{{ f.name }} ({{ f.designation }})</option>
            {% endfor %}
        </select>

        <button type="submit">Add Course</button>
    </form>
    {% endif %}
</div>
<a href="{{ url_for('home') }}">&larr; Back</a>
{% endblock %}
